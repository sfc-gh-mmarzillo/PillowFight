name: Build and Upload to TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project PillowFight.xcodeproj \
            -scheme PillowFight \
            -destination "generic/platform=iOS" \
            -archivePath build/PillowFight.xcarchive \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Check TestFlight secrets
        id: check_secrets
        run: |
          if [ -n "${{ secrets.API_KEY_ID }}" ] && [ -n "${{ secrets.ISSUER_ID }}" ] && [ -n "${{ secrets.TEAM_ID }}" ] && [ -n "${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}" ]; then
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping TestFlight upload — missing one or more secrets (API_KEY_ID, ISSUER_ID, TEAM_ID, APP_STORE_CONNECT_API_KEY_BASE64). Add them in repo Settings > Secrets."
          fi

      - name: Install Apple API Key
        if: steps.check_secrets.outputs.has_secrets == 'true'
        env:
          API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/private_keys
          echo "$API_KEY_BASE64" | base64 --decode > ~/private_keys/AuthKey_${{ secrets.API_KEY_ID }}.p8

      - name: Export and Upload to TestFlight
        if: steps.check_secrets.outputs.has_secrets == 'true'
        run: |
          cat > ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>destination</key>
              <string>upload</string>
              <key>teamID</key>
              <string>${{ secrets.TEAM_ID }}</string>
              <key>signingStyle</key>
              <string>automatic</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath build/PillowFight.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.API_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.API_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.ISSUER_ID }}
